services:
  # --- Single Dockerized App (Full Stack) ---
  - type: web
    name: omscreen-excel
    runtime: docker
    region: oregon
    envVars:
      - key: DATABASE_URL
        sync: false # Must be provided manually from Supabase
      - key: GEMINI_API_KEY
        sync: false # Must be provided manually
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: "https://omscreen-excel.onrender.com" # Default assuming this name
